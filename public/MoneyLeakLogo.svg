<svg viewBox="0 0 620 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Money Leak card logo</title>
  <desc>3D tilted credit card with stencil wordmark, Mahalakshmi cardholder, and corner drips</desc>

  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="-8" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="dropGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00DF82" flood-opacity="0.3"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="80" y="70" width="430" height="270" rx="22"/>
    </clipPath>
  </defs>

  <g transform="rotate(12, 295, 205)" filter="url(#cardShadow)">

    <rect x="88" y="78" width="430" height="270" rx="22" fill="#014d34" opacity="0.7"/>
    <rect x="84" y="74" width="430" height="270" rx="22" fill="#016040" opacity="0.5"/>
    <rect x="80" y="70" width="430" height="270" rx="22" fill="#00DF82"/>

    <g clip-path="url(#cardClip)">
      <rect x="80" y="70" width="430" height="86" fill="#030F0F"/>
      <text x="295" y="130" font-family="Arial Black, Impact, sans-serif" font-size="40" font-weight="900" fill="#00DF82" text-anchor="middle" letter-spacing="10">MONEY LEAK</text>
    </g>

    <rect x="118" y="184" width="48" height="36" rx="6" fill="#028055" opacity="0.8"/>
    <line x1="118" y1="202" x2="166" y2="202" stroke="#00DF82" stroke-width="1" opacity="0.5"/>
    <line x1="142" y1="184" x2="142" y2="220" stroke="#00DF82" stroke-width="1" opacity="0.5"/>

    <text x="295" y="240" font-family="Courier New, monospace" font-size="19" fill="#030F0F" text-anchor="middle" letter-spacing="3" font-weight="700">1008  1008  1008  1008</text>

    <text x="118" y="280" font-family="Arial, sans-serif" font-size="8" fill="#028055" letter-spacing="1.5">CARDHOLDER</text>
    <text x="118" y="298" font-family="Arial, sans-serif" font-size="13" fill="#030F0F" font-weight="700" letter-spacing="1">MAHALAKSHMI</text>

    <text x="450" y="280" font-family="Arial, sans-serif" font-size="8" fill="#028055" text-anchor="end" letter-spacing="1.5">VALID THRU</text>
    <text x="450" y="300" font-family="Arial, sans-serif" font-size="20" fill="#030F0F" text-anchor="end" font-weight="700">∞</text>

  </g>

  <line x1="484" y1="368" x2="480" y2="400" stroke="#00DF82" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <g filter="url(#dropGlow)">
    <ellipse cx="479" cy="418" rx="9" ry="12" fill="#00DF82"/>
    <polygon points="479,399 471,413 487,413" fill="#00DF82"/>
  </g>

  <g filter="url(#dropGlow)" opacity="0.8">
    <ellipse cx="475" cy="452" rx="11" ry="14" fill="#00DF82"/>
    <polygon points="475,431 466,446 484,446" fill="#00DF82"/>
  </g>

  <g filter="url(#dropGlow)" opacity="0.55">
    <ellipse cx="471" cy="489" rx="7" ry="10" fill="#00DF82"/>
    <polygon points="471,472 464,484 478,484" fill="#00DF82"/>
  </g>

</svg>
